<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="referrer" content="no-referrer">
<title>Creative Direction — The 50-Concept Set · WaveCrest®</title>
<meta name="description" content="Private view-only review copy.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f1ec;
    --paper-deep:#ebe6df;
    --ink:#1c1a17;
    --ink-soft:#5c564d;
    --ink-faint:#8d8579;
    --rule:#d8d1c6;
    --ts-blue:#004577;
    --brass:#9a7b4f;
    --rail:#17171a;
    --rail-soft:#26262b;
    --shadow:0 1px 2px rgba(28,26,23,.05), 0 12px 34px rgba(28,26,23,.13);
    --shadow-lg:0 2px 4px rgba(28,26,23,.06), 0 26px 64px rgba(28,26,23,.19);
    --rail-w:224px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }

  /* ---------- top bar ---------- */
  header{
    position:fixed; top:0; left:0; right:0; height:56px; z-index:60;
    display:flex; align-items:center; gap:16px; padding:0 20px;
    background:rgba(244,241,236,.86); backdrop-filter:blur(14px) saturate(1.4);
    -webkit-backdrop-filter:blur(14px) saturate(1.4);
    border-bottom:1px solid var(--rule);
  }
  .brandmark{
    font-family:'Inter',sans-serif; font-size:9.5px; font-weight:600;
    letter-spacing:.19em; text-transform:uppercase; color:var(--brass);
    white-space:nowrap;
  }
  .doctitle{
    font-family:'Cormorant Garamond',Georgia,serif; font-size:19px; font-weight:500;
    letter-spacing:.005em; color:var(--ink); white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0;
  }
  .hbar-sep{width:1px;height:20px;background:var(--rule);flex:none}
  .counter{
    font-size:11px; font-weight:500; letter-spacing:.09em; color:var(--ink-soft);
    font-variant-numeric:tabular-nums; white-space:nowrap; flex:none;
  }
  .counter b{color:var(--ink); font-weight:600}
  .iconbtn{
    flex:none; width:34px; height:34px; border:1px solid var(--rule); border-radius:7px;
    background:transparent; color:var(--ink-soft); cursor:pointer; display:grid; place-items:center;
    transition:background .16s, color .16s, border-color .16s;
  }
  .iconbtn:hover{background:var(--paper-deep); color:var(--ink); border-color:var(--ink-faint)}
  .iconbtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  #railToggle{display:none}

  /* progress hairline */
  .progress{position:fixed;top:56px;left:0;height:2px;background:var(--ts-blue);z-index:61;width:0;transition:width .12s linear}

  /* ---------- thumbnail rail ---------- */
  aside{
    position:fixed; top:56px; bottom:0; left:0; width:var(--rail-w); z-index:50;
    background:var(--rail); border-right:1px solid #000;
    overflow-y:auto; overscroll-behavior:contain; padding:16px 0 40px;
    scrollbar-width:thin; scrollbar-color:#3a3a41 var(--rail);
  }
  aside::-webkit-scrollbar{width:9px}
  aside::-webkit-scrollbar-track{background:var(--rail)}
  aside::-webkit-scrollbar-thumb{background:#3a3a41;border-radius:9px;border:2px solid var(--rail)}
  .railhead{
    padding:0 18px 14px; font-size:9px; font-weight:600; letter-spacing:.2em;
    text-transform:uppercase; color:#6a6a74;
  }
  .thumb{
    display:flex; gap:11px; align-items:flex-start; width:100%;
    padding:8px 14px; background:none; border:0; cursor:pointer; text-align:left;
    color:#8e8e99; transition:color .16s;
  }
  .thumb:hover{color:#d6d6de}
  .thumb img{
    width:52px; flex:none; border-radius:2px; display:block;
    box-shadow:0 0 0 1px #34343c; opacity:.62; transition:opacity .18s, box-shadow .18s;
  }
  .thumb:hover img{opacity:.9}
  .thumb.on img{opacity:1; box-shadow:0 0 0 1.5px var(--brass)}
  .thumb.on{color:#fff}
  .tmeta{padding-top:3px; min-width:0}
  .tnum{
    font-size:9px; font-weight:600; letter-spacing:.15em; color:#5f5f69;
    font-variant-numeric:tabular-nums; display:block; margin-bottom:3px;
  }
  .thumb.on .tnum{color:var(--brass)}
  .tlbl{
    font-family:'Cormorant Garamond',Georgia,serif; font-size:14px; line-height:1.24;
    font-weight:500; letter-spacing:.005em; display:block;
  }

  /* ---------- stage ---------- */
  main{margin-left:var(--rail-w); padding:56px 0 0}
  .stage{max-width:1000px; margin:0 auto; padding:40px 32px 90px}

  .plate{margin:0 0 44px; scroll-margin-top:78px}
  .plate figcaption{
    display:flex; align-items:baseline; gap:12px; margin:0 2px 11px;
  }
  .cnum{
    font-size:9.5px; font-weight:600; letter-spacing:.17em; color:var(--brass);
    font-variant-numeric:tabular-nums; flex:none;
  }
  .clbl{
    font-family:'Cormorant Garamond',Georgia,serif; font-size:17px; font-weight:500;
    color:var(--ink-soft); letter-spacing:.005em; line-height:1.2;
  }
  .plate img{
    width:100%; height:auto; display:block; border-radius:2px;
    background:#fff; box-shadow:var(--shadow);
    transition:box-shadow .3s ease; cursor:zoom-in;
    -webkit-user-drag:none; user-select:none;
  }
  .plate img:hover{box-shadow:var(--shadow-lg)}

  /* ---------- colophon ---------- */
  .colophon{
    max-width:1000px; margin:0 auto; padding:0 32px 80px;
  }
  .colophon-inner{
    border-top:1px solid var(--rule); padding-top:26px;
    display:flex; flex-wrap:wrap; gap:10px 28px; align-items:baseline;
  }
  .colophon p{margin:0; font-size:11.5px; line-height:1.65; color:var(--ink-faint); letter-spacing:.01em}
  .colophon .who{color:var(--ink-soft); font-weight:500}

  /* ---------- lightbox ---------- */
  .lb{
    position:fixed; inset:0; z-index:100; background:rgba(18,17,15,.95);
    display:none; place-items:center; padding:28px;
    opacity:0; transition:opacity .2s ease;
  }
  .lb.open{display:grid; opacity:1}
  .lb img{max-width:100%; max-height:100%; object-fit:contain; border-radius:2px; box-shadow:0 30px 90px rgba(0,0,0,.6)}
  .lb-close{
    position:absolute; top:18px; right:20px; width:38px; height:38px; border-radius:8px;
    border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.06); color:#eee;
    cursor:pointer; display:grid; place-items:center; backdrop-filter:blur(8px);
  }
  .lb-close:hover{background:rgba(255,255,255,.14)}
  .lb-close svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round}
  .lb-cap{
    position:absolute; bottom:18px; left:0; right:0; text-align:center;
    font-size:10.5px; letter-spacing:.15em; text-transform:uppercase; color:rgba(255,255,255,.45);
  }

  /* ---------- responsive ---------- */
  @media (max-width:1080px){ :root{--rail-w:196px} }
  @media (max-width:860px){
    #railToggle{display:grid}
    aside{
      transform:translateX(-100%); transition:transform .26s cubic-bezier(.4,0,.2,1);
      width:230px; box-shadow:0 0 40px rgba(0,0,0,.4);
    }
    body.rail-open aside{transform:translateX(0)}
    main{margin-left:0}
    .stage{padding:26px 18px 70px}
    .colophon{padding:0 18px 60px}
    .plate{margin-bottom:32px}
    .doctitle{font-size:16px}
    .brandmark{display:none}
    .scrim{
      position:fixed; inset:56px 0 0 0; background:rgba(20,19,17,.42); z-index:49;
      opacity:0; pointer-events:none; transition:opacity .26s;
    }
    body.rail-open .scrim{opacity:1; pointer-events:auto}
  }
  @media (max-width:560px){
    .counter{font-size:10px}
    .clbl{font-size:15px}
    .lb{padding:12px}
  }
  @media print{ aside,header,.progress,.lb{display:none!important} main{margin:0;padding:0} .plate{page-break-inside:avoid} }
</style>
</head>
<body>

<header>
  <button class="iconbtn" id="railToggle" aria-label="Toggle page list">
    <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
  <span class="brandmark">T&amp;S Brass · WaveCrest®</span>
  <span class="hbar-sep" aria-hidden="true"></span>
  <span class="doctitle">Creative Direction — The 50-Concept Set</span>
  <span class="counter"><b id="cur">1</b> / 12</span>
</header>
<div class="progress" id="prog"></div>

<div class="scrim" id="scrim"></div>

<aside id="rail">
  <div class="railhead">Contents</div>
  <div id="thumbs"></div>
</aside>

<main>
  <div class="stage" id="stage"></div>
  <div class="colophon">
    <div class="colophon-inner">
      <p class="who">Daniel B Washburn</p>
      <p>Creative Direction — The 50-Concept Set · July 18, 2026</p>
      <p>Private review copy · view only · not for distribution</p>
    </div>
  </div>
</main>

<div class="lb" id="lb">
  <button class="lb-close" id="lbClose" aria-label="Close"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  <img id="lbImg" alt="">
  <div class="lb-cap" id="lbCap"></div>
</div>

<script>
const PAGES = [
  "Cover",
  "The strategic frame",
  "Art direction pillars",
  "Typography &amp; the five-template system",
  "The copy system",
  "Application map",
  "Concept board 1 — WC50-01–12",
  "Concept board 2 — WC50-13–24",
  "Concept board 3 — WC50-25–36",
  "Concept board 4 — WC50-37–48",
  "Concept board 5 — WC50-49–50",
  "Manifest — 50 concepts"
];

const stage = document.getElementById('stage');
const thumbs = document.getElementById('thumbs');
const curEl = document.getElementById('cur');
const prog = document.getElementById('prog');

PAGES.forEach((label, i) => {
  const n = i + 1, id = String(n).padStart(2,'0');

  const fig = document.createElement('figure');
  fig.className = 'plate';
  fig.id = 'p' + n;
  fig.innerHTML =
    '<figcaption><span class="cnum">' + id + '</span><span class="clbl">' + label + '</span></figcaption>' +
    '<picture>' +
      '<source srcset="img/p' + id + '.webp" type="image/webp">' +
      '<img src="img/p' + id + '.jpg" alt="Page ' + n + ' — ' + label.replace(/&amp;/g,'and') + '" ' +
      (n <= 2 ? 'loading="eager" fetchpriority="high"' : 'loading="lazy"') + ' decoding="async" draggable="false">' +
    '</picture>';
  stage.appendChild(fig);

  const b = document.createElement('button');
  b.className = 'thumb';
  b.dataset.n = n;
  b.innerHTML =
    '<img src="img/t' + id + '.webp" alt="" loading="lazy" draggable="false">' +
    '<span class="tmeta"><span class="tnum">' + id + '</span><span class="tlbl">' + label + '</span></span>';
  b.addEventListener('click', () => {
    document.getElementById('p' + n).scrollIntoView({behavior:'smooth', block:'start'});
    if (window.innerWidth <= 860) document.body.classList.remove('rail-open');
  });
  thumbs.appendChild(b);
});

const plates = [...document.querySelectorAll('.plate')];
const tbtns  = [...document.querySelectorAll('.thumb')];
let active = 0;

function setActive(i){
  if (i === active) return;
  active = i;
  curEl.textContent = i + 1;
  tbtns.forEach((t,k) => t.classList.toggle('on', k === i));
  const t = tbtns[i], r = document.getElementById('rail');
  const top = t.offsetTop, bot = top + t.offsetHeight;
  if (top < r.scrollTop + 8 || bot > r.scrollTop + r.clientHeight - 8){
    r.scrollTo({top: top - r.clientHeight/2 + t.offsetHeight/2, behavior:'smooth'});
  }
}
setActive(0); tbtns[0].classList.add('on');

const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting && e.intersectionRatio > 0.32){
      setActive(plates.indexOf(e.target));
    }
  });
}, {rootMargin:'-70px 0px -45% 0px', threshold:[0.32, 0.6]});
plates.forEach(p => io.observe(p));

// progress hairline
const onScroll = () => {
  const h = document.documentElement.scrollHeight - window.innerHeight;
  prog.style.width = (h > 0 ? (window.scrollY / h) * 100 : 0) + '%';
};
window.addEventListener('scroll', onScroll, {passive:true});
onScroll();

// rail toggle (mobile)
const toggle = () => document.body.classList.toggle('rail-open');
document.getElementById('railToggle').addEventListener('click', toggle);
document.getElementById('scrim').addEventListener('click', () => document.body.classList.remove('rail-open'));

// lightbox
const lb = document.getElementById('lb'), lbImg = document.getElementById('lbImg'), lbCap = document.getElementById('lbCap');
function openLb(i){
  const id = String(i+1).padStart(2,'0');
  lbImg.src = 'img/p' + id + '.jpg';
  lbImg.alt = 'Page ' + (i+1);
  lbCap.textContent = id + ' · ' + PAGES[i].replace(/&amp;/g,'&');
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb(){ lb.classList.remove('open'); document.body.style.overflow = ''; }
plates.forEach((p,i) => p.querySelector('img').addEventListener('click', () => openLb(i)));
document.getElementById('lbClose').addEventListener('click', closeLb);
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });

// keyboard
addEventListener('keydown', e => {
  if (e.key === 'Escape'){ closeLb(); document.body.classList.remove('rail-open'); return; }
  if (lb.classList.contains('open')){
    if (e.key === 'ArrowRight' && active < 11) openLb(active + 1);
    if (e.key === 'ArrowLeft'  && active > 0)  openLb(active - 1);
    return;
  }
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const go = n => document.getElementById('p' + n).scrollIntoView({behavior:'smooth', block:'start'});
  if ((e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === 'j') && active < 11){ e.preventDefault(); go(active + 2); }
  if ((e.key === 'ArrowUp'   || e.key === 'ArrowLeft'  || e.key === 'k') && active > 0){ e.preventDefault(); go(active); }
  if (e.key === 'Home'){ e.preventDefault(); go(1); }
  if (e.key === 'End'){ e.preventDefault(); go(12); }
});
</script>
</body>
</html>
